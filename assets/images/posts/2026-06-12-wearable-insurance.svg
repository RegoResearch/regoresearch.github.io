<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="800" height="340" fill="#f5f7fa"/>
  <text x="400" y="44" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">로봇보조보행치료 건강보험 선별급여 조건</text>
  <text x="400" y="72" text-anchor="middle" font-size="14" fill="#5a6c7d">2025년 2월 1일 시행 · 현재는 뇌졸중 환자 대상</text>

  <!-- Condition 1 -->
  <rect x="50" y="100" width="220" height="170" rx="14" fill="#ffffff" stroke="#d6dde6"/>
  <circle cx="160" cy="140" r="22" fill="#3b82c4"/>
  <text x="160" y="148" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">1</text>
  <text x="160" y="192" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">기능적 보행지수</text>
  <text x="160" y="216" text-anchor="middle" font-size="14" fill="#44525f">FAC 2 이하</text>
  <text x="160" y="240" text-anchor="middle" font-size="12" fill="#8a99a8">(0~5단계 기준)</text>

  <!-- Condition 2 -->
  <rect x="290" y="100" width="220" height="170" rx="14" fill="#ffffff" stroke="#d6dde6"/>
  <circle cx="400" cy="140" r="22" fill="#e8833a"/>
  <text x="400" y="148" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">2</text>
  <text x="400" y="192" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">훈련 시기</text>
  <text x="400" y="216" text-anchor="middle" font-size="14" fill="#44525f">발병 후 6개월 이내</text>

  <!-- Condition 3 -->
  <rect x="530" y="100" width="220" height="170" rx="14" fill="#ffffff" stroke="#d6dde6"/>
  <circle cx="640" cy="140" r="22" fill="#5a9e6f"/>
  <text x="640" y="148" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">3</text>
  <text x="640" y="192" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">사용 기기</text>
  <text x="640" y="216" text-anchor="middle" font-size="14" fill="#44525f">식약처 3등급 인증</text>
  <text x="640" y="240" text-anchor="middle" font-size="12" fill="#8a99a8">로봇보조정형용운동장치</text>

  <text x="400" y="312" text-anchor="middle" font-size="13" fill="#b0543a">※ 척수손상·척추질환 환자는 아직 비급여 — 급여 확대 논의 중</text>
</svg>
