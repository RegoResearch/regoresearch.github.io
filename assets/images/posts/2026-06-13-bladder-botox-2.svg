<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="800" height="360" fill="#f4f7fa"/>
  <text x="400" y="44" text-anchor="middle" font-size="22" font-weight="bold" fill="#22364a">신경인성 방광 치료의 단계</text>
  <text x="400" y="70" text-anchor="middle" font-size="13" fill="#5a6c7d">아래 단계로 부족할 때 다음 단계를 고려합니다</text>

  <!-- Step 1 -->
  <rect x="70" y="100" width="660" height="58" rx="12" fill="#e8f1f8" stroke="#9cc3df"/>
  <circle cx="108" cy="129" r="19" fill="#2c7fb8"/>
  <text x="108" y="136" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">1</text>
  <text x="146" y="124" font-size="15" font-weight="bold" fill="#1f5e96">청결간헐도뇨(CIC) + 먹는 약</text>
  <text x="146" y="146" font-size="12.5" fill="#4a6678">규칙적으로 방광 비우기 · 항콜린제, 미라베그론으로 근육 진정</text>

  <!-- Step 2 -->
  <rect x="70" y="170" width="660" height="58" rx="12" fill="#dbeee2" stroke="#86c79e"/>
  <circle cx="108" cy="199" r="19" fill="#1f8a4c"/>
  <text x="108" y="206" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">2</text>
  <text x="146" y="194" font-size="15" font-weight="bold" fill="#157a40">방광 내 보톡스 주사 ★</text>
  <text x="146" y="216" font-size="12.5" fill="#3f6b51">약으로 조절 안 되거나 부작용으로 증량 어려울 때 · 내시경으로 방광벽에 주입</text>

  <!-- Step 3 -->
  <rect x="70" y="240" width="660" height="58" rx="12" fill="#f3ebdc" stroke="#d8bd8a"/>
  <circle cx="108" cy="269" r="19" fill="#b9892e"/>
  <text x="108" y="276" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">3</text>
  <text x="146" y="264" font-size="15" font-weight="bold" fill="#9a7124">수술적 치료</text>
  <text x="146" y="286" font-size="12.5" fill="#7a5d2c">방광 확대술 등 · 앞 단계로 해결되지 않는 경우 최후에 고려</text>

  <text x="400" y="336" text-anchor="middle" font-size="12" fill="#8a99a8">※ 실제 치료는 요역동학적 검사 등 평가 후 전문의가 결정합니다</text>
</svg>
