<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="800" height="420" fill="#f4f7fa"/>
  <text x="400" y="46" text-anchor="middle" font-size="23" font-weight="bold" fill="#22364a">방광 보톡스는 어떻게 작용할까</text>

  <!-- Before -->
  <text x="210" y="92" text-anchor="middle" font-size="16" font-weight="bold" fill="#c0392b">주사 전 : 과활동성 방광</text>
  <!-- bladder shape (small, tense) -->
  <path d="M150 180 q-35 0 -35 45 q0 60 95 60 q95 0 95 -60 q0 -45 -35 -45 q-30 18 -60 18 q-30 0 -60 -18 z" fill="#f5d0ca" stroke="#c0392b" stroke-width="3"/>
  <!-- jagged contraction lines -->
  <path d="M160 215 l12 -10 l10 12 l12 -11 l10 12 l12 -10 l10 12 l12 -11" fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <text x="210" y="262" text-anchor="middle" font-size="13" fill="#a33327">근육이 멋대로 수축</text>
  <text x="210" y="300" text-anchor="middle" font-size="13" fill="#7a5">▪ 용적 작음  ▪ 압력 높음</text>
  <text x="210" y="322" text-anchor="middle" font-size="13" fill="#a33327">▪ 요실금  ▪ 신장 위험</text>

  <!-- arrow + syringe -->
  <line x1="330" y1="240" x2="460" y2="240" stroke="#2c7fb8" stroke-width="7" stroke-linecap="round"/>
  <polygon points="475,240 452,227 452,253" fill="#2c7fb8"/>
  <text x="400" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c7fb8">보톡스 주사</text>
  <text x="400" y="270" text-anchor="middle" font-size="11.5" fill="#5a6c7d">아세틸콜린 차단</text>

  <!-- After -->
  <text x="590" y="92" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f8a4c">주사 후 : 이완된 방광</text>
  <!-- bladder shape (large, relaxed) -->
  <path d="M510 165 q-45 0 -45 55 q0 78 125 78 q125 0 125 -78 q0 -55 -45 -55 q-38 22 -80 22 q-42 0 -80 -22 z" fill="#cfe9d8" stroke="#1f8a4c" stroke-width="3"/>
  <!-- smooth line -->
  <path d="M520 220 q70 22 140 0" fill="none" stroke="#1f8a4c" stroke-width="2.5"/>
  <text x="590" y="282" text-anchor="middle" font-size="13" fill="#157a40">근육이 이완·진정</text>
  <text x="590" y="320" text-anchor="middle" font-size="13" fill="#157a40">▪ 용적 확대  ▪ 압력 정상화</text>
  <text x="590" y="342" text-anchor="middle" font-size="13" fill="#157a40">▪ 실금 감소  ▪ 신장 보호</text>

  <text x="400" y="398" text-anchor="middle" font-size="12" fill="#8a99a8">효과 지속 약 6~9개월 · 6~12개월 간격 재주사 (개인차 있음)</text>
</svg>
