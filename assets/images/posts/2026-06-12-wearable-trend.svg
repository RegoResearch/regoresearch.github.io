<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="800" height="360" fill="#f5f7fa"/>
  <text x="400" y="44" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">재활로봇의 흐름 변화</text>

  <!-- Left: hospital robot -->
  <rect x="60" y="80" width="280" height="220" rx="14" fill="#ffffff" stroke="#d6dde6"/>
  <text x="200" y="120" text-anchor="middle" font-size="17" font-weight="bold" fill="#5a6c7d">예전 : 치료실에 고정된 로봇</text>
  <!-- treadmill robot pictogram -->
  <rect x="140" y="230" width="120" height="14" rx="7" fill="#90a4b8"/>
  <line x1="200" y1="150" x2="200" y2="170" stroke="#90a4b8" stroke-width="6" stroke-linecap="round"/>
  <rect x="170" y="138" width="60" height="16" rx="8" fill="#90a4b8"/>
  <circle cx="200" cy="186" r="11" fill="#5a6c7d"/>
  <line x1="200" y1="197" x2="200" y2="222" stroke="#5a6c7d" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="205" x2="184" y2="218" stroke="#5a6c7d" stroke-width="5" stroke-linecap="round"/>
  <line x1="200" y1="205" x2="216" y2="218" stroke="#5a6c7d" stroke-width="5" stroke-linecap="round"/>
  <line x1="200" y1="222" x2="190" y2="240" stroke="#5a6c7d" stroke-width="5" stroke-linecap="round"/>
  <line x1="200" y1="222" x2="210" y2="240" stroke="#5a6c7d" stroke-width="5" stroke-linecap="round"/>
  <text x="200" y="278" text-anchor="middle" font-size="13" fill="#8a99a8">트레드밀 · 천장 현수 장치 · 병원 안</text>

  <!-- Arrow -->
  <line x1="355" y1="190" x2="430" y2="190" stroke="#3b82c4" stroke-width="8" stroke-linecap="round"/>
  <polygon points="445,190 422,176 422,204" fill="#3b82c4"/>

  <!-- Right: wearable -->
  <rect x="460" y="80" width="280" height="220" rx="14" fill="#eaf3fb" stroke="#3b82c4"/>
  <text x="600" y="120" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f5e96">지금 : 몸에 입고 일상으로</text>
  <!-- walking person with exo legs -->
  <circle cx="590" cy="160" r="11" fill="#1f5e96"/>
  <line x1="590" y1="171" x2="592" y2="206" stroke="#1f5e96" stroke-width="6" stroke-linecap="round"/>
  <line x1="591" y1="182" x2="572" y2="198" stroke="#1f5e96" stroke-width="5" stroke-linecap="round"/>
  <line x1="591" y1="182" x2="610" y2="194" stroke="#1f5e96" stroke-width="5" stroke-linecap="round"/>
  <line x1="592" y1="206" x2="576" y2="236" stroke="#e8833a" stroke-width="7" stroke-linecap="round"/>
  <line x1="576" y1="236" x2="586" y2="252" stroke="#e8833a" stroke-width="7" stroke-linecap="round"/>
  <line x1="592" y1="206" x2="612" y2="232" stroke="#e8833a" stroke-width="7" stroke-linecap="round"/>
  <line x1="612" y1="232" x2="606" y2="254" stroke="#e8833a" stroke-width="7" stroke-linecap="round"/>
  <line x1="540" y1="256" x2="660" y2="256" stroke="#b9cfe2" stroke-width="4" stroke-linecap="round"/>
  <text x="600" y="278" text-anchor="middle" font-size="13" fill="#4a7196">평지 · 계단 · 집 — 착용형 로봇</text>
</svg>
